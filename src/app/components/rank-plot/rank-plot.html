<div class="w-full bg-white rounded border border-gray-200 overflow-hidden">
  @if (data().length > 0) {
    <plotly-plot
      [data]="graphData().data"
      [layout]="graphData().layout"
      [config]="graphConfig"
      [useResizeHandler]="true"
      [style]="{width: '100%', height: '300px'}"
      (plotlyClick)="onPlotClick($event)"
      (selected)="onPlotSelected($event)"
    ></plotly-plot>
  } @else {
    <div class="flex items-center justify-center h-[300px] text-gray-400 text-sm italic">
      No data available for rank plot.
    </div>
  }
</div>
